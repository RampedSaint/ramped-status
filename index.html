<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramped — Status 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --surface3: #222222;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0ede8;
  --muted: #666660;
  --muted2: #444440;
  --lime: #c8f135;
  --lime-dim: rgba(200,241,53,0.12);
  --lime-dim2: rgba(200,241,53,0.06);
  --orange: #ff6b2b;
  --orange-dim: rgba(255,107,43,0.12);
  --red: #e84040;
  --red-dim: rgba(232,64,64,0.1);
  --blue: #4d9de0;
  --blue-dim: rgba(77,157,224,0.1);
  --ok: #c8f135;
  --warn: #ff6b2b;
  --danger: #e84040;
  --font: 'DM Sans', sans-serif;
  --display: 'Bebas Neue', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }

/* ── HEADER ── */
.header {
  padding: 2rem 2.5rem 0;
  max-width: 1300px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  border-bottom: 1px solid var(--border2);
  padding-bottom: 1.25rem;
}
.header-left { display: flex; flex-direction: column; gap: 4px; }
.wordmark {
  font-family: var(--display);
  font-size: 42px;
  letter-spacing: .04em;
  line-height: 1;
  background: linear-gradient(135deg, #6C3BFF, #FF4FA3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .12em;
  text-transform: uppercase;
  font-weight: 300;
}
.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
.header-date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
}

/* ── TABS ── */
.tabs-bar {
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 2.5rem;
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border);
}
.tab-btn {
  padding: 14px 20px;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  background: none;
  border: none;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all .2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active-gm { color: var(--lime); border-bottom-color: var(--lime); }
.tab-btn.active-live { color: var(--blue); border-bottom-color: var(--blue); }

/* ── SHELL ── */
.shell { max-width: 1300px; margin: 0 auto; padding: 2rem 2.5rem 4rem; }

/* ── PANELS ── */
.panel { display: none; }
.panel.active { display: block; }

/* ── MONTHS ROW (top) ── */
.months-section { margin-bottom: 2.5rem; }
.section-eyebrow {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.eyebrow-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.dot-lime { background: var(--lime); }
.dot-blue { background: var(--blue); }
.dot-orange { background: var(--orange); }

.months-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }

/* ── MONTH CARD ── */
.month-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color .2s;
}
.month-card:hover { border-color: var(--border2); }
.month-card.is-current { border-color: var(--lime); }
.month-card.is-current-live { border-color: var(--blue); }

.mc-head {
  padding: .75rem 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.mc-head-gm { background: var(--lime-dim2); }
.mc-head-live { background: var(--blue-dim); }
.mc-head-current-gm { background: var(--lime-dim); }
.mc-head-current-live { background: rgba(77,157,224,0.18); }

.mc-name {
  font-family: var(--display);
  font-size: 20px;
  letter-spacing: .06em;
  color: var(--text);
}
.mc-name.current-gm { color: var(--lime); }
.mc-name.current-live { color: var(--blue); }

.mc-pill {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .06em;
  padding: 3px 8px;
  border-radius: 4px;
}
.mc-pill.ok { background: rgba(200,241,53,.15); color: var(--lime); }
.mc-pill.warn { background: rgba(255,107,43,.15); color: var(--orange); }
.mc-pill.danger { background: rgba(232,64,64,.15); color: var(--red); }
.mc-pill.neutral { background: var(--surface3); color: var(--muted); }

.mc-body { padding: .875rem 1rem; }

.mc-kpis { display: grid; gap: 8px; margin-bottom: 10px; }
.mc-kpis-2 { grid-template-columns: 1fr 1fr; }
.mc-kpis-3 { grid-template-columns: 1fr 1fr 1fr; }

.kpi-lbl {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 3px;
}
.kpi-num {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}
.kpi-num.lime { color: var(--lime); }
.kpi-num.orange { color: var(--orange); }
.kpi-num.blue { color: var(--blue); }
.kpi-num.muted { color: var(--muted); }
.kpi-num.red { color: var(--red); }

/* PROGRESS */
.mc-progress { margin-top: 2px; }
.mc-progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  font-family: var(--mono);
  color: var(--muted);
  margin-bottom: 4px;
}
.mc-progress-track { height: 8px; background: var(--surface3); border-radius: 4px; overflow: hidden; }
.mc-progress-fill { height: 100%; border-radius: 4px; }

/* TOGGLE TABLE */
.mc-toggle {
  width: 100%;
  background: none;
  border: none;
  border-top: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--font);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 7px 1rem;
  text-align: left;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: all .15s;
}
.mc-toggle:hover { background: var(--surface2); color: var(--text); }
.arrow { font-size: 11px; color: var(--muted); transition: color .2s; }
.mc-toggle:hover .arrow { color: var(--text); }

.mc-detail { display: none; border-top: 1px solid var(--border); overflow-x: auto; }
.mc-detail.open { display: block; }

table.dt { width: 100%; border-collapse: collapse; font-size: 11px; }
table.dt thead th {
  padding: 6px 10px;
  text-align: right;
  color: var(--muted);
  font-weight: 500;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .08em;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.dt thead th:first-child { text-align: left; }
table.dt tbody td {
  padding: 6px 10px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
}
table.dt tbody td:first-child { text-align: left; font-family: var(--font); font-size: 11px; font-weight: 400; }
table.dt tbody tr:last-child td { border-bottom: none; font-weight: 500; background: var(--surface2); }
table.dt tbody tr:hover td { background: rgba(255,255,255,.025); }

/* ROLLOVER */
.rollover-block {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.rollover-title {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 5px;
}
.rollover-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  padding: 2px 0;
}
.rollover-client { color: var(--text); opacity: .7; }
.rollover-amt { font-family: var(--mono); font-size: 11px; color: var(--orange); }

/* ── ANALYSIS SECTION ── */
.analysis-section { margin-top: 2.5rem; }
.analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.analysis-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem;
}
.analysis-card.full { grid-column: 1 / -1; }
.ac-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
}
.chart-legend {
  display: flex;
  gap: 14px;
  margin-bottom: 10px;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
.legend-dot { width: 7px; height: 7px; border-radius: 2px; }

/* SUMMARY STRIP */
.summary-strip {
  display: grid;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 2rem;
}
.strip-5 { grid-template-columns: repeat(5, 1fr); }
.strip-4 { grid-template-columns: repeat(4, 1fr); }
.strip-card {
  background: var(--surface);
  padding: 1rem 1.25rem;
}
.sc-lbl {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.sc-val {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}
.sc-val.lime { color: var(--lime); }
.sc-val.orange { color: var(--orange); }
.sc-val.blue { color: var(--blue); }
.sc-sub { font-size: 10px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

/* ── HIGHLIGHTS ── */
.highlights-section { margin-top: 2.5rem; }
.highlights-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
.highlight-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem;
  position: relative;
  overflow: hidden;
}
.highlight-card.gold { border-color: rgba(200,241,53,.3); }
.highlight-card.focus { border-color: rgba(77,157,224,.3); }
.highlight-card.alert { border-color: rgba(255,107,43,.3); }
.hc-tag {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-bottom: .75rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tag-lime { color: var(--lime); }
.tag-blue { color: var(--blue); }
.tag-orange { color: var(--orange); }
.hc-number {
  font-family: var(--display);
  font-size: 36px;
  letter-spacing: .04em;
  line-height: 1;
  margin-bottom: 4px;
}
.hc-number.lime { color: var(--lime); }
.hc-number.blue { color: var(--blue); }
.hc-number.orange { color: var(--orange); }
.hc-label { font-size: 12px; color: var(--text); font-weight: 400; line-height: 1.4; }
.hc-sub { font-size: 11px; color: var(--muted); margin-top: 6px; font-family: var(--mono); }

.refresh-btn { background:none; border:1px solid var(--border); border-radius:6px; color:var(--muted); font-size:16px; width:32px; height:32px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; }
.refresh-btn:hover { color:var(--lime); border-color:var(--lime); }

.filter-bar { max-width:1300px; margin:0 auto; padding:12px 2.5rem; display:flex; gap:6px; }
.filter-btn { padding:6px 14px; font-family:var(--font); font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--muted); transition:all .2s; }
.filter-btn:hover { color:var(--text); border-color:var(--border2); }
.filter-btn.active { background:var(--lime-dim); color:var(--lime); border-color:rgba(200,241,53,.25); }

.chart-wrap { position: relative; width: 100%; height: 200px; }
.chart-wrap-lg { position: relative; width: 100%; height: 260px; }
.no-data-msg { font-size: 10px; color: var(--muted); margin-top: 6px; }
.gap-tag { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-family: var(--mono); padding: 2px 7px; border-radius: 3px; margin-top: 5px; font-weight: 500; }
.gap-tag.ok { background: var(--lime-dim); color: var(--lime); }
.gap-tag.warn { background: var(--orange-dim); color: var(--orange); }
.gap-tag.bad { background: var(--red-dim); color: var(--red); }
.gap-tag.neutral { background: var(--surface3); color: var(--muted); }
.cmp-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.cmp-title { font-size: 9px; font-weight: 500; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
.cmp-stat { font-family: var(--mono); font-size: 12px; color: var(--text); }

/* ── MODAL ── */
.modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.75); z-index:1000; backdrop-filter:blur(4px); align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal-box { background:var(--surface); border:1px solid var(--border2); border-radius:12px; max-width:700px; width:90%; max-height:80vh; overflow-y:auto; position:relative; }
.modal-head { padding:1rem 1.25rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--surface); z-index:1; }
.modal-title { font-family:var(--display); font-size:22px; letter-spacing:.04em; }
.modal-close { background:none; border:1px solid var(--border); border-radius:6px; color:var(--muted); font-size:18px; width:32px; height:32px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.modal-close:hover { color:var(--text); border-color:var(--border2); }
.modal-body { padding:1.25rem; }

.alert-banner { background:var(--orange-dim); border:1px solid rgba(255,107,43,.25); border-radius:8px; padding:.75rem 1rem; font-size:12px; color:var(--orange); margin-bottom:1rem; display:flex; align-items:center; gap:8px; }
.alert-icon { font-size:16px; }
.annual-bar { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem 1.25rem; margin-bottom:1.5rem; }
.annual-bar-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
.annual-bar-title { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
.annual-bar-pct { font-family:var(--mono); font-size:20px; font-weight:500; }
.annual-bar-track { height:12px; background:var(--surface3); border-radius:6px; overflow:hidden; position:relative; }
.annual-bar-fill { height:100%; border-radius:6px; transition:width .5s; }
.annual-bar-meta { display:flex; justify-content:space-between; margin-top:6px; font-size:10px; color:var(--muted); }
.accounts-section { margin-top: 2.5rem; }

/* ── RESPONSIVE ── */
@media (max-width: 1000px) {
  .months-grid { grid-template-columns: repeat(2, 1fr); }
  .highlights-grid { grid-template-columns: repeat(2, 1fr); }
  .analysis-grid { grid-template-columns: 1fr; }
  .strip-5 { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 640px) {
  .months-grid { grid-template-columns: 1fr; }
  .highlights-grid { grid-template-columns: 1fr; }
  .shell { padding: 1.5rem 1rem 3rem; }
  .header { padding: 1.5rem 1rem 1rem; }
  .tabs-bar { padding: 0 1rem; }
  .strip-5, .strip-4 { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="wordmark">RAMPED</div>
    <div class="header-sub">Status Report &nbsp;·&nbsp; 2026</div>
  </div>
  <div class="header-right">
    <button class="refresh-btn" onclick="loadData()" title="Actualizar datos">&#8635;</button>
    <div class="header-date" id="lastUpdate"></div>
  </div>
</div>

<div class="tabs-bar">
  <button class="tab-btn active-gm" id="tab-gm" onclick="switchTab('gm')">Negocio · GM</button>
  <button class="tab-btn" id="tab-live" onclick="switchTab('live')">Ejecución · Live</button>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-period="all" onclick="setFilter('all',this)">Año 2026</button>
  <button class="filter-btn" data-period="q1" onclick="setFilter('q1',this)">Q1</button>
  <button class="filter-btn" data-period="q2" onclick="setFilter('q2',this)">Q2</button>
  <button class="filter-btn" data-period="q3" onclick="setFilter('q3',this)">Q3</button>
  <button class="filter-btn" data-period="q4" onclick="setFilter('q4',this)">Q4</button>
</div>

<div class="shell">

  <!-- ══ PANEL GM ══ -->
  <div class="panel active" id="panel-gm">

    <div class="summary-strip strip-5" id="summary-gm"></div>
    <div id="annual-progress"></div>
    <div id="alert-gm" style="display:none"></div>

    <div class="analysis-section">
      <div class="section-eyebrow">
        <span class="eyebrow-dot dot-lime"></span>
        Comparaciones Clave
      </div>
      <div class="analysis-grid">
        <div class="analysis-card">
          <div class="cmp-header">
            <span class="cmp-title">Revenue Expected vs Booked + Fee</span>
            <span class="cmp-stat" id="gm-cmp-rev-stat"></span>
          </div>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.15)"></div>Budget esperado</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Booked + Fee</div>
          </div>
          <div class="chart-wrap"><canvas id="chartBudgetBooked"></canvas></div>
          <div id="gm-cmp-rev-gap" style="margin-top:8px"></div>
        </div>
        <div class="analysis-card">
          <div class="cmp-header">
            <span class="cmp-title">GM Objetivo vs Real</span>
            <span class="cmp-stat" id="gm-cmp-gm-stat"></span>
          </div>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--lime)"></div>GM Real</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--red);opacity:.7;border-radius:0"></div>Objetivo $50k</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>GM%</div>
          </div>
          <div class="chart-wrap"><canvas id="chartGM"></canvas></div>
          <div id="gm-cmp-gm-gap" style="margin-top:8px"></div>
        </div>
      </div>
    </div>

    <div class="months-section">
      <div class="section-eyebrow">
        <span class="eyebrow-dot dot-lime"></span>
        Meses
      </div>
      <div class="months-grid" id="months-gm"></div>
    </div>

    <div class="highlights-section">
      <div class="section-eyebrow">
        <span class="eyebrow-dot dot-orange"></span>
        Destacados
      </div>
      <div class="highlights-grid" id="highlights-gm"></div>
    </div>

    <div class="accounts-section">
      <div class="section-eyebrow">
        <span class="eyebrow-dot dot-lime"></span>
        Top Accounts 2026
      </div>
      <div id="top-accounts"></div>
    </div>

  </div>

  <!-- ══ PANEL LIVE ══ -->
  <div class="panel" id="panel-live">

    <div class="summary-strip strip-4" id="summary-live"></div>

    <div class="analysis-section">
      <div class="section-eyebrow">
        <span class="eyebrow-dot dot-blue"></span>
        Live del Año
      </div>
      <div class="analysis-grid">
        <div class="analysis-card full">
          <div class="cmp-header">
            <span class="cmp-title">Live mensual — cada mes en su color · línea = Booked</span>
            <span class="cmp-stat" id="live-year-stat"></span>
          </div>
          <div class="chart-wrap-lg"><canvas id="chartLiveYear"></canvas></div>
        </div>
      </div>
    </div>

    <div class="months-section">
      <div class="section-eyebrow">
        <span class="eyebrow-dot dot-blue"></span>
        Meses
      </div>
      <div class="months-grid" id="months-live"></div>
    </div>

    <div class="analysis-section">
      <div class="section-eyebrow">
        <span class="eyebrow-dot dot-blue"></span>
        Ejecución por Mes
      </div>
      <div id="exec-bars"></div>
    </div>

    <div class="highlights-section">
      <div class="section-eyebrow">
        <span class="eyebrow-dot dot-orange"></span>
        Destacados
      </div>
      <div class="highlights-grid" id="highlights-live"></div>
    </div>

  </div>

<div class="modal-overlay" id="clientModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

</div>

<script>
const SHEET_ID = '1_7CkoRFvCZyCOfkt69Co6l8K1FAWw12J_E4K43EZfx8';
const SHEET_GID = '59282509';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${SHEET_GID}`;

// Auto-detect current month from system date
const MONTH_ORDER = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTH_COLORS = [
  '#c8f135','#4d9de0','#ff6b2b','#e84040',
  '#a78bfa','#34d399','#f59e0b','#f472b6',
  '#60a5fa','#fb923c','#86efac','#38bdf8'
];
const CURRENT_MONTH = MONTH_ORDER[new Date().getMonth()];
const PREV_MONTH = MONTH_ORDER[(new Date().getMonth() + 11) % 12];

document.getElementById('lastUpdate').textContent = new Date().toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'});

/* ── PARSERS ── */
function parseMoney(s) {
  if (!s || s === '-' || s === '#DIV/0!') return null;
  // Remove $, spaces, then replace dots used as thousands separators
  let c = s.replace(/[$\s]/g, '');
  // If format is like 12.026 (dot as thousands), remove dots
  // If negative like -$50.000
  const neg = c.startsWith('-');
  c = c.replace('-','').replace(/\./g,'');
  const n = parseFloat(c);
  if (isNaN(n)) return null;
  return neg ? -n : n;
}
function parsePercent(s) {
  if (!s) return null;
  const n = parseFloat(s.replace('%','').trim());
  return isNaN(n) ? null : n;
}
function fmt(n) {
  if (n === null || n === undefined) return '—';
  if (n === 0) return '$0';
  return '$' + Math.round(Math.abs(n)).toLocaleString('es-AR');
}
function fmtK(n) { return n ? '$' + (n/1000).toFixed(0) + 'k' : '—'; }

function parseCSV(text) {
  return text.split(/\r?\n/).filter(l => l.trim()).map(l => {
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < l.length; i++) {
      if (l[i] === '"') { inQ = !inQ; continue; }
      if (l[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
      cur += l[i];
    }
    cols.push(cur.trim());
    return cols;
  });
}

function extractMonths(rows) {
  // Detect if sheet has extra empty column at position 2 (Google Sheets format)
  // by checking the header row for "BOOKED" position
  let colOffset = 0;
  for (const row of rows) {
    if ((row[0] || '').match(/CLIENTES/i)) {
      // If col 2 is empty and col 3 has "BOOKED", we have the extra column
      if ((!row[2] || row[2].trim() === '') && row[3] && row[3].includes('BOOKED')) colOffset = 1;
      break;
    }
  }
  const C = { budget: 1, booked: 2 + colOffset, fee: 3 + colOffset, live: 4 + colOffset, bookedFee: 5 + colOffset, cost: 6 + colOffset, gm: 7 + colOffset, gmPct: 8 + colOffset };

  const months = []; let i = 0;
  while (i < rows.length) {
    const row = rows[i]; const header = row[0] || '';
    const match = header.match(/CLIENTES\s+(\w+)/i);
    if (match) {
      const mn = match[1].charAt(0).toUpperCase() + match[1].slice(1).toLowerCase();
      const clients = []; let total = null, gmObj = 50000;
      i++;
      while (i < rows.length) {
        const r = rows[i]; const label = (r[0] || '').trim();
        if (!label || label.match(/CLIENTES\s+\w+/i)) break;
        if (label.toUpperCase().startsWith('TOTAL')) {
          total = { budget: parseMoney(r[C.budget]), booked: parseMoney(r[C.booked]), fee: parseMoney(r[C.fee]), live: parseMoney(r[C.live]), bookedFee: parseMoney(r[C.bookedFee]), cost: parseMoney(r[C.cost]), gm: parseMoney(r[C.gm]), gmPct: parsePercent(r[C.gmPct]) };
          i++; continue;
        }
        if (label === '') {
          // Detect GM OBJETIVO row: empty label, value ~50000 in GM column or cost column
          const gmVal = parseMoney(r[C.gm]);
          const costVal = parseMoney(r[C.cost]);
          const anyText = (r[C.cost]||'').toString() + (r[C.gm]||'').toString();
          if (anyText.includes('GM OBJETIVO') || anyText.includes('RESTANTE')) { if (anyText.includes('GM OBJETIVO')) gmObj = gmVal || costVal || 50000; i++; continue; }
          if (gmVal === 50000 || costVal === 50000) { gmObj = 50000; i++; continue; }
          if (gmVal && gmVal < 0) { i++; continue; } // RESTANTE row (negative)
          i++; continue;
        }
        if (label.startsWith('Cantidad') || label.startsWith('%') || label.startsWith('Difer') || label.startsWith('Objeti') || label.startsWith('Live')) break;
        if (label) clients.push({ name: label, budget: parseMoney(r[C.budget]), booked: parseMoney(r[C.booked]), fee: parseMoney(r[C.fee]), live: parseMoney(r[C.live]), gm: parseMoney(r[C.gm]), gmPct: parsePercent(r[C.gmPct]) });
        i++;
      }
      if (total || clients.length) months.push({ name: mn, clients, total, gmObj });
      continue;
    }
    i++;
  }
  return months;
}

// Sort: reverse chronological (most recent first)
function sortMonthsDisplay(months) {
  return [...months].sort((a,b) => MONTH_ORDER.indexOf(a.name) - MONTH_ORDER.indexOf(b.name));
}


function computeRollover(months) {
  const pastMonths = months.filter(m => m.name !== CURRENT_MONTH);
  const rollover = {};
  pastMonths.forEach(m => {
    m.clients.forEach(c => {
      const pending = (c.booked || 0) - (c.live || 0);
      if (pending > 200) {
        rollover[c.name] = (rollover[c.name] || 0) + pending;
      }
    });
  });
  return rollover;
}

function pillClass(p) {
  if (p === null) return 'neutral';
  if (p >= 100) return 'ok';
  if (p >= 70) return 'warn';
  return 'danger';
}
function pillLabel(p) { return p === null ? 'Sin datos' : Math.round(p) + '% obj.'; }
function barFill(p) {
  if (p === null) return 'var(--muted2)';
  if (p >= 100) return 'var(--lime)';
  if (p >= 70) return 'var(--orange)';
  return 'var(--red)';
}
function execFill(p) {
  if (p === null) return 'var(--muted2)';
  if (p >= 80) return 'var(--lime)';
  if (p >= 40) return 'var(--blue)';
  return 'var(--orange)';
}

function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t => { t.classList.remove('active-gm','active-live'); });
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active-' + tab);
}

function findTopClient(clients, key) {
  let best = null, bestVal = 0;
  if (!clients) return { name: null, val: 0 };
  clients.forEach(c => { if ((c[key] || 0) > bestVal) { bestVal = c[key]; best = c.name; } });
  return { name: best, val: bestVal };
}

function openClientModal(monthName, clients, total, type) {
  document.getElementById('modalTitle').textContent = monthName.toUpperCase() + ' — Clientes';
  const isGM = type === 'gm';
  const headers = isGM
    ? '<tr><th>Cliente</th><th>Budget</th><th>Booked</th><th>Fee</th><th>GM</th><th>GM%</th></tr>'
    : '<tr><th>Cliente</th><th>Booked</th><th>Live</th><th>Pendiente</th></tr>';
  const rows = clients.map(c => {
    if (isGM) return `<tr><td>${c.name}</td><td>${fmt(c.budget)}</td><td>${fmt(c.booked)}</td><td>${fmt(c.fee)}</td><td>${fmt(c.gm)}</td><td>${c.gmPct !== null ? c.gmPct + '%' : '—'}</td></tr>`;
    const pend = (c.booked||0) - (c.live||0);
    return `<tr><td>${c.name}</td><td>${fmt(c.booked)}</td><td>${fmt(c.live)}</td><td style="color:${pend > 500 ? 'var(--orange)' : 'var(--muted)'}">${fmt(pend)}</td></tr>`;
  }).join('');
  const totRow = total ? (isGM
    ? `<tr style="border-top:2px solid var(--border2)"><td><strong>Total</strong></td><td>${fmt(total.budget)}</td><td>${fmt(total.booked)}</td><td>${fmt(total.fee)}</td><td><strong>${fmt(total.gm)}</strong></td><td>${total.gmPct !== null ? total.gmPct + '%' : '—'}</td></tr>`
    : `<tr style="border-top:2px solid var(--border2)"><td><strong>Total</strong></td><td>${fmt(total.booked)}</td><td>${fmt(total.live)}</td><td><strong>${fmt((total.booked||0)-(total.live||0))}</strong></td></tr>`)
    : '';
  document.getElementById('modalBody').innerHTML = `<table class="dt">${headers}<tbody>${rows}${totRow}</tbody></table>`;
  document.getElementById('clientModal').classList.add('open');
}
function closeModal() {
  document.getElementById('clientModal').classList.remove('open');
}

/* ── RENDER GM ── */
function renderGM(months, sorted) {
  window._months = months;
  const chrono = sortMonthsDisplay(months);
  const completedMonths = months.filter(m => m.total?.gm && m.total.gm > 0);
  const totalGM = completedMonths.reduce((s,m) => s + (m.total?.gm || 0), 0);
  const totalObj = completedMonths.reduce((s,m) => s + m.gmObj, 0);
  const totalBooked = months.reduce((s,m) => s + (m.total?.booked || 0), 0);
  const totalFee = months.reduce((s,m) => s + (m.total?.fee || 0), 0);
  const totalBudget = months.reduce((s,m) => s + (m.total?.budget || 0), 0);
  const avPct = totalObj > 0 ? (totalGM / totalObj) * 100 : null;
  const avColor = avPct >= 100 ? 'lime' : avPct >= 70 ? 'orange' : 'red';

  // Compute trends (compare to previous month)
  const chronoForTrend = sortMonthsDisplay(months);
  const trendMap = {};
  for (let t = 1; t < chronoForTrend.length; t++) {
    const prev = chronoForTrend[t-1].total?.gm || 0;
    const curr = chronoForTrend[t].total?.gm || 0;
    if (prev > 0 && curr > 0) {
      trendMap[chronoForTrend[t].name] = curr > prev ? 'up' : curr < prev ? 'down' : 'flat';
    }
  }

  // Month cards
  document.getElementById('months-gm').innerHTML = sorted.map(m => {
    const isCurrent = m.name === CURRENT_MONTH;
    const gm = m.total?.gm || null;
    const gmPct = gm && m.gmObj ? (gm / m.gmObj) * 100 : null;
    const barW = gmPct !== null ? Math.min(gmPct, 100) : 0;
    const hasData = m.total?.booked > 0;

    return `
    <div class="month-card ${isCurrent ? 'is-current' : ''}">
      <div class="mc-head ${isCurrent ? 'mc-head-current-gm' : 'mc-head-gm'}">
        <span class="mc-name ${isCurrent ? 'current-gm' : ''}">${m.name.toUpperCase()}</span>
        <span class="mc-pill ${hasData ? pillClass(gmPct) : 'neutral'}">${hasData ? pillLabel(gmPct) : 'En curso'}</span>
      </div>
      <div class="mc-body">
        <div class="mc-kpis mc-kpis-3">
          <div class="kpi-block">
            <div class="kpi-lbl">Booked</div>
            <div class="kpi-num">${fmt(m.total?.booked)}</div>
          </div>
          <div class="kpi-block">
            <div class="kpi-lbl">Fee</div>
            <div class="kpi-num blue">${fmt(m.total?.fee)}</div>
          </div>
          <div class="kpi-block">
            <div class="kpi-lbl">GM</div>
            <div class="kpi-num ${hasData ? (gmPct >= 100 ? 'lime' : 'orange') : 'muted'}">${fmt(gm)}${trendMap[m.name] === 'up' ? ' <span style="font-size:10px;color:var(--lime)">↑</span>' : trendMap[m.name] === 'down' ? ' <span style="font-size:10px;color:var(--orange)">↓</span>' : ''}</div>
          </div>
        </div>
        <div class="mc-kpis mc-kpis-2">
          <div class="kpi-block">
            <div class="kpi-lbl">Budget exp.</div>
            <div class="kpi-num muted">${fmt(m.total?.budget)}</div>
          </div>
          <div class="kpi-block">
            <div class="kpi-lbl">GM %</div>
            <div class="kpi-num">${m.total?.gmPct !== null ? m.total.gmPct + '%' : '—'}</div>
          </div>
        </div>
        ${hasData ? `
        <div class="mc-progress">
          <div class="mc-progress-meta">
            <span>${fmt(gm)} / ${fmt(m.gmObj)}</span>
            <span>${gmPct !== null ? Math.round(gmPct) + '%' : '—'}</span>
          </div>
          <div class="mc-progress-track">
            <div class="mc-progress-fill" style="width:${barW}%;background:${barFill(gmPct)}"></div>
          </div>
        </div>` : `<div class="no-data-msg">Mes en curso — sin datos aún</div>`}
      </div>
      <button class="mc-toggle" onclick="openClientModal('${m.name}',window._months.find(x=>x.name==='${m.name}').clients,window._months.find(x=>x.name==='${m.name}').total,'gm')">
        <span>Clientes (${m.clients.length})</span><span class="arrow">→</span>
      </button>
    </div>`;
  }).join('');

  // Summary strip
  const totalBFAll = months.reduce((s,m) => s + (m.total?.bookedFee || (m.total?.booked||0)+(m.total?.fee||0)), 0);
  const convPct = totalBudget > 0 ? Math.round((totalBFAll / totalBudget) * 100) : null;
  document.getElementById('summary-gm').innerHTML = `
    <div class="strip-card">
      <div class="sc-lbl">GM Acumulada</div>
      <div class="sc-val ${avColor}">${fmt(totalGM)}</div>
      <div class="sc-sub">obj. ${fmt(totalObj)} · ${avPct !== null ? Math.round(avPct) + '%' : '—'}</div>
    </div>
    <div class="strip-card">
      <div class="sc-lbl">Budget Esperado</div>
      <div class="sc-val">${fmt(totalBudget)}</div>
      <div class="sc-sub">revenue esperado</div>
    </div>
    <div class="strip-card">
      <div class="sc-lbl">Booked + Fee</div>
      <div class="sc-val ${convPct >= 100 ? 'lime' : convPct >= 70 ? 'blue' : 'orange'}">${fmt(totalBFAll)}</div>
      <div class="sc-sub">${convPct !== null ? convPct + '% del budget' : '—'}</div>
    </div>
    <div class="strip-card">
      <div class="sc-lbl">Total Booked</div>
      <div class="sc-val">${fmt(totalBooked)}</div>
      <div class="sc-sub">Fee: ${fmt(totalFee)}</div>
    </div>
    <div class="strip-card">
      <div class="sc-lbl">Meses cerrados</div>
      <div class="sc-val">${completedMonths.length}</div>
      <div class="sc-sub">de ${months.length} en el año</div>
    </div>`;

  // Annual progress bar
  const currentMonth = months.find(m => m.name === CURRENT_MONTH);
  const ANNUAL_GOAL = 3000000;
  const totalRevenue = months.reduce((s,m) => s + ((m.total?.bookedFee) || ((m.total?.booked||0)+(m.total?.fee||0))), 0);
  const annualPct = ANNUAL_GOAL > 0 ? Math.min((totalRevenue / ANNUAL_GOAL) * 100, 100) : 0;
  const annualColor = annualPct >= 25 ? 'var(--lime)' : annualPct >= 15 ? 'var(--blue)' : 'var(--orange)';
  document.getElementById('annual-progress').innerHTML = `
    <div class="annual-bar">
      <div class="annual-bar-header">
        <span class="annual-bar-title">Objetivo anual de facturación</span>
        <span class="annual-bar-pct" style="color:${annualColor}">${annualPct.toFixed(1)}%</span>
      </div>
      <div class="annual-bar-track">
        <div class="annual-bar-fill" style="width:${annualPct}%;background:${annualColor}"></div>
      </div>
      <div class="annual-bar-meta">
        <span>${fmt(totalRevenue)} facturado</span>
        <span>Objetivo: ${fmt(ANNUAL_GOAL)}</span>
        <span>Faltan: ${fmt(ANNUAL_GOAL - totalRevenue)}</span>
      </div>
    </div>`;

  // Alert banner
  const alertEl = document.getElementById('alert-gm');
  if (currentMonth && (currentMonth.total?.budget || 0) > 0 && !(currentMonth.total?.booked > 0)) {
    alertEl.innerHTML = `<div class="alert-banner"><span class="alert-icon">⚡</span> <strong>${CURRENT_MONTH}:</strong> ${fmt(currentMonth.total.budget)} en budget esperado sin booking confirmado</div>`;
    alertEl.style.display = 'block';
  } else {
    alertEl.style.display = 'none';
  }

  // ── Chart 1: Budget Esperado vs Booked + Fee ──
  const totalBudgetCmp = months.reduce((s,m) => s + (m.total?.budget || 0), 0);
  const totalBookedFee = months.reduce((s,m) => s + (m.total?.bookedFee || (m.total?.booked||0)+(m.total?.fee||0)), 0);
  const revGapPct = totalBudgetCmp > 0 ? (totalBookedFee / totalBudgetCmp) * 100 : null;
  const revGapAbs = totalBookedFee - totalBudgetCmp;
  document.getElementById('gm-cmp-rev-stat').textContent = revGapPct !== null ? Math.round(revGapPct) + '% del budget' : '';
  document.getElementById('gm-cmp-rev-gap').innerHTML = revGapPct !== null
    ? `<span class="gap-tag ${revGapPct >= 100 ? 'ok' : revGapPct >= 70 ? 'warn' : 'bad'}">${revGapAbs >= 0 ? '+' : ''}${fmt(revGapAbs)} vs budget total</span>`
    : '';

  new Chart(document.getElementById('chartBudgetBooked'), {
    type: 'bar',
    data: {
      labels: chrono.map(m => m.name.slice(0,3).toUpperCase()),
      datasets: [
        {
          label: 'Budget Esperado',
          data: chrono.map(m => m.total?.budget || 0),
          backgroundColor: 'rgba(255,255,255,0.08)',
          borderColor: 'rgba(255,255,255,0.18)',
          borderWidth: 1,
          borderRadius: 4,
          barPercentage: .75,
          categoryPercentage: .65,
          order: 2
        },
        {
          label: 'Booked + Fee',
          data: chrono.map(m => m.total?.bookedFee || (m.total?.booked||0)+(m.total?.fee||0)),
          backgroundColor: chrono.map(m => {
            const budget = m.total?.budget || 0;
            const bf = m.total?.bookedFee || (m.total?.booked||0)+(m.total?.fee||0);
            if (!budget || !bf) return 'rgba(77,157,224,0.25)';
            const p = bf / budget;
            return p >= 1 ? '#c8f135' : p >= 0.7 ? '#4d9de0' : '#ff6b2b';
          }),
          borderRadius: 4,
          barPercentage: .75,
          categoryPercentage: .65,
          order: 1
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + fmt(ctx.raw) } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#666660', font: { size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { callback: v => fmtK(v), color: '#666660', font: { size: 10 } }, border: { display: false } }
      }
    }
  });

  // ── Chart 2: GM Objetivo vs Real ──
  const totalGMObj = months.reduce((s,m) => s + m.gmObj, 0);
  const gmGapAbs = totalGM - totalGMObj;
  const gmGapPct = totalGMObj > 0 ? (totalGM / totalGMObj) * 100 : null;
  document.getElementById('gm-cmp-gm-stat').textContent = gmGapPct !== null ? Math.round(gmGapPct) + '% del objetivo' : '';
  document.getElementById('gm-cmp-gm-gap').innerHTML = gmGapPct !== null
    ? `<span class="gap-tag ${gmGapPct >= 100 ? 'ok' : gmGapPct >= 70 ? 'warn' : 'bad'}">${gmGapAbs >= 0 ? '+' : ''}${fmt(gmGapAbs)} vs objetivo acumulado</span>`
    : '';

  new Chart(document.getElementById('chartGM'), {
    type: 'bar',
    data: {
      labels: chrono.map(m => m.name.slice(0,3).toUpperCase()),
      datasets: [
        {
          label: 'GM Real',
          data: chrono.map(m => m.total?.gm || 0),
          backgroundColor: chrono.map(m => {
            const p = m.total?.gm && m.gmObj ? (m.total.gm / m.gmObj) * 100 : 0;
            return p >= 100 ? '#c8f135' : p >= 70 ? '#ff6b2b' : p > 0 ? '#e84040' : 'rgba(255,255,255,0.07)';
          }),
          borderRadius: 4,
          barPercentage: .6,
          order: 2
        },
        {
          label: 'Objetivo',
          data: chrono.map(m => m.gmObj),
          type: 'line',
          borderColor: 'rgba(232,64,64,0.6)',
          borderDash: [5, 3],
          borderWidth: 2,
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 1
        },
        {
          label: 'GM%',
          data: chrono.map(m => m.total?.gmPct || 0),
          type: 'line',
          borderColor: '#4d9de0',
          borderWidth: 1.5,
          pointRadius: 3,
          pointBackgroundColor: '#4d9de0',
          fill: false,
          tension: 0.3,
          yAxisID: 'y1',
          order: 0
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + (ctx.dataset.yAxisID === 'y1' ? ctx.raw + '%' : fmt(ctx.raw)) } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#666660', font: { size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { callback: v => fmtK(v), color: '#666660', font: { size: 10 } }, border: { display: false } },
        y1: { position: 'right', grid: { display: false }, ticks: { callback: v => v + '%', color: '#4d9de0', font: { size: 10 } }, border: { display: false }, min: 0, max: 100 }
      }
    }
  });

  // Highlights
  const prevMonth = months.find(m => m.name === PREV_MONTH);

  const topGM = findTopClient(prevMonth?.clients, 'gm');
  const topBudget = findTopClient(currentMonth?.clients, 'budget');

  const gmGap = currentMonth ? currentMonth.gmObj - (currentMonth.total?.gm || 0) : null;

  const worstGMPct = prevMonth?.clients
    .filter(c => (c.booked || 0) > 0 && c.gmPct !== null)
    .sort((a, b) => (a.gmPct || 0) - (b.gmPct || 0))[0] || null;

  document.getElementById('highlights-gm').innerHTML = `
    <div class="highlight-card gold">
      <div class="hc-tag tag-lime">★ Mejor GM — ${PREV_MONTH}</div>
      <div class="hc-number lime">${fmt(topGM.val)}</div>
      <div class="hc-label">${topGM.name || '—'}</div>
      <div class="hc-sub">Mayor gross margin del mes cerrado</div>
    </div>
    <div class="highlight-card focus">
      <div class="hc-tag tag-blue">→ Foco — ${CURRENT_MONTH}</div>
      <div class="hc-number blue">${fmt(topBudget.val)}</div>
      <div class="hc-label">${topBudget.name || '—'}</div>
      <div class="hc-sub">Mayor budget esperado este mes</div>
    </div>
    <div class="highlight-card alert">
      <div class="hc-tag tag-orange">⚡ Gap GM — ${CURRENT_MONTH}</div>
      <div class="hc-number orange">${gmGap !== null ? fmt(gmGap) : '—'}</div>
      <div class="hc-label">Por cerrar para alcanzar objetivo</div>
      <div class="hc-sub">Objetivo ${fmt(currentMonth?.gmObj)}</div>
    </div>
    <div class="highlight-card" style="border-color:rgba(232,64,64,.3)">
      <div class="hc-tag" style="color:var(--red)">⚠ Menor GM% — ${PREV_MONTH}</div>
      <div class="hc-number" style="color:var(--red)">${worstGMPct ? worstGMPct.gmPct + '%' : '—'}</div>
      <div class="hc-label">${worstGMPct?.name || '—'}</div>
      <div class="hc-sub">Peor margen del mes cerrado</div>
    </div>`;

  // Top Accounts
  const accountMap = {};
  months.forEach(m => {
    m.clients.forEach(c => {
      if (!accountMap[c.name]) accountMap[c.name] = { booked: 0, fee: 0, gm: 0, months: 0, gmByMonth: [] };
      accountMap[c.name].booked += (c.booked || 0);
      accountMap[c.name].fee += (c.fee || 0);
      accountMap[c.name].gm += (c.gm || 0);
      if ((c.booked || 0) > 0) {
        accountMap[c.name].months++;
        accountMap[c.name].gmByMonth.push(c.gm || 0);
      }
    });
  });
  const topAccounts = Object.entries(accountMap)
    .map(([name, d]) => {
      const gmPct = d.booked > 0 ? Math.round((d.gm / d.booked) * 100) : 0;
      const trend = d.gmByMonth.length >= 2 ? (d.gmByMonth[d.gmByMonth.length-1] > d.gmByMonth[d.gmByMonth.length-2] ? 'up' : d.gmByMonth[d.gmByMonth.length-1] < d.gmByMonth[d.gmByMonth.length-2] ? 'down' : 'flat') : 'na';
      return { name, ...d, gmPct, trend };
    })
    .filter(a => a.booked > 0)
    .sort((a, b) => b.gm - a.gm);
  const maxGM = topAccounts[0]?.gm || 1;

  document.getElementById('top-accounts').innerHTML = `
    <table class="dt">
      <thead><tr><th>Cliente</th><th>Booked</th><th>GM Total</th><th>GM%</th><th>Trend</th><th>Meses</th><th></th></tr></thead>
      <tbody>${topAccounts.map(a => `
        <tr>
          <td><strong>${a.name}</strong></td>
          <td>${fmt(a.booked)}</td>
          <td style="color:var(--lime);font-weight:600">${fmt(a.gm)}</td>
          <td style="color:${a.gmPct >= 50 ? 'var(--lime)' : a.gmPct >= 30 ? 'var(--orange)' : 'var(--red)'};font-weight:600">${a.gmPct}%</td>
          <td>${a.trend === 'up' ? '<span style="color:var(--lime)">&#8593;</span>' : a.trend === 'down' ? '<span style="color:var(--orange)">&#8595;</span>' : '<span style="color:var(--muted)">&mdash;</span>'}</td>
          <td>${a.months}</td>
          <td style="width:100px"><div style="height:4px;background:var(--surface3);border-radius:2px;overflow:hidden"><div style="height:100%;width:${Math.round((a.gm/maxGM)*100)}%;background:var(--lime);border-radius:2px"></div></div></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

/* ── RENDER LIVE ── */
function renderLive(months, sorted, rollover) {
  const chrono = sortMonthsDisplay(months);
  const prevMonth = months.find(m => m.name === PREV_MONTH);
  const currentMonth = months.find(m => m.name === CURRENT_MONTH);
  const completedMonths = months.filter(m => m.total?.booked > 0);
  const totalBooked = completedMonths.reduce((s,m) => s + (m.total?.booked || 0), 0);
  const totalLive = completedMonths.reduce((s,m) => s + (m.total?.live || 0), 0);
  const totalPending = totalBooked - totalLive;
  const execPct = totalBooked > 0 ? (totalLive / totalBooked) * 100 : null;

  // Month cards
  document.getElementById('months-live').innerHTML = sorted.map(m => {
    const isCurrent = m.name === CURRENT_MONTH;
    const booked = m.total?.booked || null;
    const live = m.total?.live || null;
    const ep = booked > 0 && live !== null ? (live / booked) * 100 : null;
    const barW = ep !== null ? Math.min(ep, 100) : 0;
    const hasData = booked > 0;
    const rolloverItems = isCurrent ? Object.entries(rollover).filter(([,v]) => v > 200) : [];

    const rolloverHTML = rolloverItems.length > 0 ? `
      <div class="rollover-block">
        <div class="rollover-title">Rollover de meses anteriores</div>
        ${rolloverItems.map(([name, val]) => `
          <div class="rollover-row">
            <span class="rollover-client">${name}</span>
            <span class="rollover-amt">${fmt(val)}</span>
          </div>`).join('')}
      </div>` : '';

    return `
    <div class="month-card ${isCurrent ? 'is-current-live' : ''}">
      <div class="mc-head ${isCurrent ? 'mc-head-current-live' : 'mc-head-live'}">
        <span class="mc-name ${isCurrent ? 'current-live' : ''}">${m.name.toUpperCase()}</span>
        ${isCurrent ? '<span class="mc-pill neutral">Mes actual</span>' : `<span class="mc-pill ${pillClass(ep)}">${hasData ? Math.round(ep||0)+'% ejec.' : 'Sin datos'}</span>`}
      </div>
      <div class="mc-body">
        <div class="mc-kpis mc-kpis-2">
          <div class="kpi-block">
            <div class="kpi-lbl">Booked</div>
            <div class="kpi-num blue">${fmt(booked)}</div>
          </div>
          <div class="kpi-block">
            <div class="kpi-lbl">Live</div>
            <div class="kpi-num lime">${fmt(live)}</div>
          </div>
        </div>
        ${hasData ? `
        <div class="mc-progress">
          <div class="mc-progress-meta">
            <span>${fmt(live)} / ${fmt(booked)}</span>
            <span>${ep !== null ? Math.round(ep) + '%' : '—'}</span>
          </div>
          <div class="mc-progress-track">
            <div class="mc-progress-fill" style="width:${barW}%;background:${execFill(ep)}"></div>
          </div>
        </div>` : `<div class="no-data-msg">Mes en curso — sin datos aún</div>`}
        ${rolloverHTML}
      </div>
      <button class="mc-toggle" onclick="openClientModal('${m.name}',window._months.find(x=>x.name==='${m.name}').clients,window._months.find(x=>x.name==='${m.name}').total,'live')">
        <span>Clientes (${m.clients.length})</span><span class="arrow">→</span>
      </button>
    </div>`;
  }).join('');

  // Summary strip
  document.getElementById('summary-live').innerHTML = `
    <div class="strip-card">
      <div class="sc-lbl">Total Booked</div>
      <div class="sc-val blue">${fmt(totalBooked)}</div>
      <div class="sc-sub">comprometido</div>
    </div>
    <div class="strip-card">
      <div class="sc-lbl">Total Live</div>
      <div class="sc-val lime">${fmt(totalLive)}</div>
      <div class="sc-sub">ejecutado</div>
    </div>
    <div class="strip-card">
      <div class="sc-lbl">Pendiente</div>
      <div class="sc-val orange">${fmt(totalPending)}</div>
      <div class="sc-sub">por ejecutar</div>
    </div>
    <div class="strip-card">
      <div class="sc-lbl">Ejecución global</div>
      <div class="sc-val ${execPct >= 80 ? 'lime' : 'orange'}">${execPct !== null ? Math.round(execPct) + '%' : '—'}</div>
      <div class="sc-sub">booked → live</div>
    </div>`;

  // ── Live del Año — multicolor ──
  const totalLiveYear = chrono.reduce((s,m) => s + (m.total?.live || 0), 0);
  const totalBookedYear = chrono.reduce((s,m) => s + (m.total?.booked || 0), 0);
  const liveExecPct = totalBookedYear > 0 ? (totalLiveYear / totalBookedYear) * 100 : null;
  document.getElementById('live-year-stat').textContent = liveExecPct !== null ? Math.round(liveExecPct) + '% ejecutado del año' : '';

  new Chart(document.getElementById('chartLiveYear'), {
    type: 'bar',
    data: {
      labels: chrono.map(m => m.name.slice(0,3).toUpperCase()),
      datasets: [
        {
          label: 'Live',
          data: chrono.map(m => m.total?.live || 0),
          backgroundColor: chrono.map((m, i) => MONTH_COLORS[MONTH_ORDER.indexOf(m.name)] ?? MONTH_COLORS[i % 12]),
          borderRadius: 5,
          barPercentage: .65,
          order: 2
        },
        {
          label: 'Booked',
          data: chrono.map(m => m.total?.booked || 0),
          type: 'line',
          borderColor: 'rgba(255,255,255,0.3)',
          borderWidth: 2,
          borderDash: [4, 3],
          pointRadius: 4,
          pointBackgroundColor: chrono.map((m, i) => MONTH_COLORS[MONTH_ORDER.indexOf(m.name)] ?? MONTH_COLORS[i % 12]),
          pointBorderColor: 'rgba(255,255,255,0.5)',
          pointBorderWidth: 1.5,
          fill: false,
          tension: 0,
          order: 1
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + ctx.dataset.label + ': ' + fmt(ctx.raw),
            afterBody: (items) => {
              const idx = items[0].dataIndex;
              const m = chrono[idx];
              if (!m) return [];
              const booked = m.total?.booked || 0;
              const live = m.total?.live || 0;
              const pct = booked > 0 ? Math.round((live / booked) * 100) : 0;
              return [`  Ejecución: ${pct}%`];
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#666660', font: { size: 11 } } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { callback: v => fmtK(v), color: '#666660', font: { size: 10 } }, border: { display: false } }
      }
    }
  });

  // Execution % bars
  const execBarsHTML = chrono.filter(m => m.total?.booked > 0).map(m => {
    const booked = m.total?.booked || 0;
    const live = m.total?.live || 0;
    const pct = booked > 0 ? Math.round((live / booked) * 100) : 0;
    const color = pct >= 100 ? 'var(--lime)' : pct >= 70 ? 'var(--blue)' : 'var(--orange)';
    return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <div style="width:60px;font-size:11px;font-weight:600;color:var(--muted);text-align:right">${m.name.slice(0,3).toUpperCase()}</div>
      <div style="flex:1;height:24px;background:var(--surface3);border-radius:4px;overflow:hidden;position:relative">
        <div style="height:100%;width:${Math.min(pct,100)}%;background:${color};border-radius:4px;transition:width .5s"></div>
        <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:${pct >= 50 ? 'var(--bg)' : 'var(--text)'}">${pct}%</span>
      </div>
      <div style="width:80px;font-size:10px;color:var(--muted)">${fmt(live)} / ${fmt(booked)}</div>
    </div>`;
  }).join('');
  document.getElementById('exec-bars').innerHTML = execBarsHTML || '<div style="color:var(--muted);font-size:12px">Sin datos</div>';

  // Highlights live
  const topLive = findTopClient(prevMonth?.clients, 'live');

  const totalRollover = Object.values(rollover).reduce((s,v) => s+v, 0);
  const rolloverCount = Object.keys(rollover).length;

  const topBudget = findTopClient(currentMonth?.clients, 'budget');

  document.getElementById('highlights-live').innerHTML = `
    <div class="highlight-card gold">
      <div class="hc-tag tag-lime">★ Mayor Live — ${PREV_MONTH}</div>
      <div class="hc-number lime">${fmt(topLive.val)}</div>
      <div class="hc-label">${topLive.name || '—'}</div>
      <div class="hc-sub">Mayor ejecución de contenidos del mes</div>
    </div>
    <div class="highlight-card alert">
      <div class="hc-tag tag-orange">⚡ Rollover pendiente</div>
      <div class="hc-number orange">${fmt(totalRollover)}</div>
      <div class="hc-label">${rolloverCount} cliente${rolloverCount !== 1 ? 's' : ''} con contenido pendiente</div>
      <div class="hc-sub">Arrastre de meses anteriores</div>
    </div>
    <div class="highlight-card focus">
      <div class="hc-tag tag-blue">→ Foco — ${CURRENT_MONTH}</div>
      <div class="hc-number blue">${fmt(topBudget.val)}</div>
      <div class="hc-label">${topBudget.name || '—'}</div>
      <div class="hc-sub">Mayor presupuesto a ejecutar este mes</div>
    </div>`;
}

/* ── QUARTER FILTER ── */
const QUARTERS = { q1: ['Enero','Febrero','Marzo'], q2: ['Abril','Mayo','Junio'], q3: ['Julio','Agosto','Septiembre'], q4: ['Octubre','Noviembre','Diciembre'] };
let currentFilter = 'all';

function setFilter(period, btn) {
  currentFilter = period;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (window._allMonths) renderAll(window._allMonths);
}

function filterMonths(months) {
  if (currentFilter === 'all') return months;
  const allowed = QUARTERS[currentFilter];
  return months.filter(m => allowed.includes(m.name));
}

function renderAll(allMonths) {
  const months = filterMonths(allMonths);
  if (months.length === 0) {
    document.getElementById('months-gm').innerHTML = '<div style="color:var(--muted);padding:2rem;text-align:center">Sin datos para este período</div>';
    return;
  }
  const sorted = sortMonthsDisplay(months);
  const rollover = computeRollover(allMonths);

  // Destroy existing charts before re-rendering
  Object.values(Chart.instances || {}).forEach(c => c.destroy());

  renderGM(months, sorted);
  renderLive(months, sorted, rollover);
}

/* ── MAIN ── */
async function loadData() {
  try {
    document.getElementById('months-gm').innerHTML = '<div style="color:var(--muted);padding:2rem;text-align:center">Cargando datos...</div>';
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error(`Sheet error: ${res.status}`);
    const csv = await res.text();
    const rows = parseCSV(csv);
    const months = extractMonths(rows);
    if (months.length === 0) throw new Error('No se encontraron datos de meses');
    window._allMonths = months;
    renderAll(months);
    document.getElementById('lastUpdate').textContent = 'Actualizado: ' + new Date().toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric', hour:'2-digit', minute:'2-digit'});

    // Auto-refresh every 5 minutes
    if (!window._refreshInterval) {
      window._refreshInterval = setInterval(loadData, 5 * 60 * 1000);
    }
  } catch (err) {
    console.error('Error loading sheet:', err);
    document.getElementById('months-gm').innerHTML = `<div style="color:var(--red);padding:2rem;text-align:center">Error cargando datos: ${err.message}</div>`;
  }
}
loadData();
</script>
</body>
</html>
